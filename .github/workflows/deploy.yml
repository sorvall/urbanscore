# Деплой на VPS: архив кода → SCP → распаковка → docker compose (backend + frontend).
#
# Секреты GitHub (Settings → Secrets and variables → Actions):
#   SERVER_HOST     — IP или домен сервера
#   SERVER_USER     — пользователь SSH (например root или deploy)
#   SSH_PASSWORD    — пароль SSH (или задайте ключ ниже вместо пароля — см. appleboy docs)
#   DEPLOY_PATH     — каталог на сервере, например /root/urbanscore-app
#
# Опционально:
#   SSH_PORT        — порт SSH, если не 22
#   VITE_YM_ID      — номер Яндекс.Метрики (подставляется в сборку фронта в CI)
#
# На сервере один раз: установлены Docker и docker compose plugin.
# В DEPLOY_PATH положите файл .env (не в git) с ключами DaData, DeepSeek и:
#   VITE_API_BASE_URL=https://ваш-домен-или-ip:8080   (или https://api.… если прокси)
#   VITE_SITE_URL=https://ваш-фронт
#   APP_CORS_ORIGINS=https://ваш-фронт
#
# Порты по умолчанию из docker-compose: бэкенд 8080, фронт 5173→80 в контейнере.

name: Build and Deploy Urbanscore

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      SSH_PORT_DEPLOY: ${{ secrets.SSH_PORT }}

    steps:
      - name: Verify deployment secrets
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.SERVER_HOST }}" ] || [ -z "${{ secrets.SERVER_USER }}" ] || \
             [ -z "${{ secrets.SSH_PASSWORD }}" ] || [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
            echo "::error::Задайте секреты репозитория: SERVER_HOST, SERVER_USER, SSH_PASSWORD, DEPLOY_PATH (скрипт: scripts/gh-set-deploy-secrets.sh)"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend (fail fast before deploy)
        run: mvn -B -q -DskipTests package

      - name: Build frontend (fail fast before deploy)
        working-directory: frontend
        env:
          # Номер счётчика Метрики (секрет опционален; без него — без счётчика в бандле)
          VITE_YM_ID: ${{ secrets.VITE_YM_ID }}
        run: npm ci && npm run build

      - name: Create deployment archive
        run: |
          set -euo pipefail
          ARCHIVE_PATH="/tmp/urbanscore-deploy-${GITHUB_RUN_ID}.tgz"
          tar --exclude='.git' \
            --exclude='node_modules' \
            --exclude='frontend/node_modules' \
            --exclude='target' \
            --exclude='.github' \
            -czf "${ARCHIVE_PATH}" .
          mv "${ARCHIVE_PATH}" urbanscore-deploy.tgz

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ env.SSH_PORT_DEPLOY != '' && env.SSH_PORT_DEPLOY || 22 }}
          script: mkdir -p '${{ secrets.DEPLOY_PATH }}'

      - name: Copy archive to remote server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ env.SSH_PORT_DEPLOY != '' && env.SSH_PORT_DEPLOY || 22 }}
          source: "urbanscore-deploy.tgz"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Extract and run Docker Compose
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ env.SSH_PORT_DEPLOY != '' && env.SSH_PORT_DEPLOY || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}'
            test -n "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            # Обновляем код, не трогая .env и загруженный архив
            find . -mindepth 1 -maxdepth 1 \
              ! -name '.env' \
              ! -name 'urbanscore-deploy.tgz' \
              -exec rm -rf {} +
            tar xzf urbanscore-deploy.tgz
            rm -f urbanscore-deploy.tgz

            if [ ! -f .env ]; then
              echo "::error::.env not found in ${DEPLOY_PATH}. Create ${DEPLOY_PATH}/.env on server (see .env.example in repo)."
              if [ -f .env.example ]; then
                echo "::notice::You can initialize with: cp ${DEPLOY_PATH}/.env.example ${DEPLOY_PATH}/.env and fill secrets."
              fi
              exit 1
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found. Installing via get.docker.com..."
              if command -v curl >/dev/null 2>&1; then
                curl -fsSL https://get.docker.com | sh
              elif command -v wget >/dev/null 2>&1; then
                wget -qO- https://get.docker.com | sh
              else
                echo "::error::Neither curl nor wget is available to install Docker."
                exit 1
              fi
            fi

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "::error::Docker Compose is not available on server."
              exit 1
            fi

            if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
              echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            else
              echo "::notice::DOCKERHUB_USERNAME/DOCKERHUB_TOKEN not set; using anonymous pulls."
            fi

            $COMPOSE_CMD up -d --build
            # Caddyfile смонтирован томом: при деплое файл на диске новый, но процесс читает конфиг при старте — перезапуск применяет его.
            $COMPOSE_CMD restart caddy
            $COMPOSE_CMD ps
