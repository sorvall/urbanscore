# Деплой на удалённый сервер: rsync кода + docker compose up --build
#
# Нужные секреты репозитория (Settings → Secrets and variables → Actions):
#   SSH_PRIVATE_KEY — приватный ключ (pem), пара к публичному ключу в ~/.ssh/authorized_keys на сервере
#   SSH_HOST       — хост или IP сервера
#   SSH_USER       — пользователь SSH (например deploy)
#   DEPLOY_PATH    — абсолютный путь к каталогу с проектом на сервере (например /home/deploy/urbanscore)
#
# Опционально:
#   SSH_PORT       — порт SSH, если не 22
#
# На сервере один раз:
#   - git clone не обязателен — каталог создаётся при первом деплое из Actions
#   - положите .env рядом с docker-compose.yml (ключи DaData, DeepSeek и т.д.) — в репозиторий .env не попадает
#   - для продакшена в .env задайте VITE_API_BASE_URL и VITE_SITE_URL (публичные URL API и сайта для сборки фронта)

name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Rsync and Docker Compose
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          test -n "${SSH_HOST:-}" && test -n "${SSH_USER:-}" && test -n "${DEPLOY_PATH:-}" || {
            echo "Задайте секреты SSH_HOST, SSH_USER и DEPLOY_PATH"
            exit 1
          }
          PORT="${SSH_PORT:-22}"
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -p ${PORT}"
          ssh ${SSH_OPTS} "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='frontend/node_modules' \
            --exclude='target' \
            --exclude='.env' \
            --exclude='.github' \
            -e "ssh ${SSH_OPTS}" \
            ./ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"
          ssh ${SSH_OPTS} "${SSH_USER}@${SSH_HOST}" \
            "set -euo pipefail; cd '${DEPLOY_PATH}' && docker compose up -d --build && docker compose ps"
