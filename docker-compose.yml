services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urbanscore-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # «-» без двоеточия: дефолт только если переменная не задана; пустая строка = same-origin /api (nginx → app)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL-http://localhost:8080}
        VITE_SITE_URL: ${VITE_SITE_URL-http://localhost:5173}
    container_name: urbanscore-frontend
    depends_on:
      - app
    ports:
      - "5173:80"

  # HTTPS (Let's Encrypt): прокси на фронт и API. На сервере задайте CADDY_DOMAIN и откройте 80/443.
  caddy:
    image: caddy:2.8-alpine
    container_name: urbanscore-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - frontend

volumes:
  caddy_data:
  caddy_config:
