services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urbanscore-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_SITE_URL: ${VITE_SITE_URL:-http://localhost:5173}
    container_name: urbanscore-frontend
    depends_on:
      - app
    ports:
      - "5173:80"
