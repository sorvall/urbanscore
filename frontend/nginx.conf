server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Тот же origin, что и SPA (например :5173→80): API на бэкенде в контейнере app
    # Часть браузеров и роботов запрашивает /favicon.ico напрямую
    location = /favicon.ico {
        alias /usr/share/nginx/html/favicon.ico;
        default_type image/x-icon;
    }

    location /api/ {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # POST /api/v1/report ждёт ответ DeepSeek до нескольких минут (см. DEEPSEEK_RESPONSE_TIMEOUT)
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
