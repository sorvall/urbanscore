spring:
  application:
    name: urbanscore
  # Явно отключаем автоконфигурацию БД и Redis — в проекте они не используются.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

external:
  dadata:
    base-url: ${DADATA_BASE_URL:https://suggestions.dadata.ru}
    token: ${DADATA_API_TOKEN:}
    secret: ${DADATA_SECRET:}
    enabled: ${DADATA_ENABLED:true}
    min-request-interval-ms: ${DADATA_MIN_REQUEST_INTERVAL_MS:0}
    address-division: ${DADATA_ADDRESS_DIVISION:administrative}

deepseek:
  # camelCase — надёжная привязка к record DeepSeekProperties(apiKey, …)
  baseUrl: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  apiKey: ${DEEPSEEK_API_KEY:}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  connectTimeout: ${DEEPSEEK_CONNECT_TIMEOUT:15s}
  # Длинные отчёты часто >2 мин; при «Timeout on blocking read» увеличьте значение.
  responseTimeout: ${DEEPSEEK_RESPONSE_TIMEOUT:300s}
  # Системный промпт — prompts/deepseek-system-prompt.txt. Переопределить: DEEPSEEK_SYSTEM_PROMPT или DEEPSEEK_SYSTEM_PROMPT_PATH
  systemPromptPath: ${DEEPSEEK_SYSTEM_PROMPT_PATH:classpath:prompts/deepseek-system-prompt.txt}
  # Текст задания отчёта (user message) — prompts/deepseek-user-prompt.txt. Переопределить: DEEPSEEK_USER_PROMPT или DEEPSEEK_USER_PROMPT_PATH
  userPromptPath: ${DEEPSEEK_USER_PROMPT_PATH:classpath:prompts/deepseek-user-prompt.txt}
  # Веб-поиск в chat/completions (enable_search). Отключить: DEEPSEEK_ENABLE_SEARCH=false
  enableSearch: ${DEEPSEEK_ENABLE_SEARCH:true}
  # Режим «Умный поиск» (search_mode: smart). Не отправлять поле: DEEPSEEK_SEARCH_MODE= (пусто)
  searchMode: ${DEEPSEEK_SEARCH_MODE:smart}

app:
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.ecorating: INFO
