spring:
  application:
    name: urbanscore
  # Явно отключаем автоконфигурацию БД и Redis — в проекте они не используются.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

external:
  dadata:
    base-url: ${DADATA_BASE_URL:https://suggestions.dadata.ru}
    token: ${DADATA_API_TOKEN:}
    secret: ${DADATA_SECRET:}
    enabled: ${DADATA_ENABLED:true}
    min-request-interval-ms: ${DADATA_MIN_REQUEST_INTERVAL_MS:0}
    address-division: ${DADATA_ADDRESS_DIVISION:administrative}

deepseek:
  # camelCase — надёжная привязка к record DeepSeekProperties(apiKey, …)
  baseUrl: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  apiKey: ${DEEPSEEK_API_KEY:}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  connectTimeout: ${DEEPSEEK_CONNECT_TIMEOUT:15s}
  responseTimeout: ${DEEPSEEK_RESPONSE_TIMEOUT:120s}
  # Текст промпта — в файле prompts/deepseek-system-prompt.txt (редактируйте и пересоберите / перезапустите).
  # Переопределить целиком: DEEPSEEK_SYSTEM_PROMPT. Другой файл: DEEPSEEK_SYSTEM_PROMPT_PATH=file:/abs/path/prompt.txt
  systemPromptPath: ${DEEPSEEK_SYSTEM_PROMPT_PATH:classpath:prompts/deepseek-system-prompt.txt}

app:
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.ecorating: INFO
